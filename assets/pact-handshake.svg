<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4956b"/>
      <stop offset="100%" style="stop-color:#c4866a"/>
    </linearGradient>
    <linearGradient id="metal" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7d8fa0"/>
      <stop offset="50%" style="stop-color:#95a5b5"/>
      <stop offset="100%" style="stop-color:#8090a0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- Glow behind handshake -->
  <circle cx="400" cy="170" r="80" fill="url(#glow)" opacity="0.25"/>

  <g transform="translate(400, 170)">
    <!-- ===== HUMAN ARM (from left) ===== -->
    <!-- Sleeve -->
    <rect x="-220" y="-18" width="60" height="42" rx="4" fill="#2c3e50"/>
    <!-- Forearm -->
    <rect x="-165" y="-14" width="110" height="34" rx="10" fill="url(#skin)"/>
    <!-- Human palm (center, overlapping with robot) -->
    <ellipse cx="-30" cy="4" rx="38" ry="26" fill="url(#skin)"/>

    <!-- Human thumb (on top, wrapping over robot palm) -->
    <path d="M -50,-15 Q -55,-28 -40,-32 Q -25,-34 -15,-22" stroke="#c4866a" stroke-width="15" fill="none" stroke-linecap="round"/>

    <!-- Human fingers (wrapping UNDER robot hand — drawn first so robot overlaps) -->
    <path d="M 8,12 Q 25,14 35,22 Q 40,28 34,33" stroke="#bf7e5e" stroke-width="13" fill="none" stroke-linecap="round"/>
    <path d="M 5,0 Q 28,0 38,10 Q 44,18 36,24" stroke="#c4866a" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M 0,-12 Q 25,-14 38,-4 Q 44,4 36,12" stroke="#c88e6e" stroke-width="13" fill="none" stroke-linecap="round"/>

    <!-- ===== ROBOT ARM (from right) ===== -->
    <!-- Forearm plate -->
    <rect x="100" y="-20" width="120" height="44" rx="3" fill="url(#metal)" stroke="#667788" stroke-width="1"/>
    <!-- Panel lines -->
    <line x1="140" y1="-18" x2="140" y2="22" stroke="#667788" stroke-width="0.8" opacity="0.4"/>
    <line x1="175" y1="-18" x2="175" y2="22" stroke="#667788" stroke-width="0.8" opacity="0.4"/>
    <!-- LEDs -->
    <circle cx="158" cy="-10" r="2.5" fill="#4fc3f7" opacity="0.9"/>
    <circle cx="190" cy="-10" r="2.5" fill="#4fc3f7" opacity="0.9"/>

    <!-- Wrist joint -->
    <circle cx="100" cy="2" r="16" fill="url(#metal)" stroke="#667788" stroke-width="1.5"/>
    <circle cx="100" cy="2" r="6" fill="#4fc3f7" opacity="0.4"/>

    <!-- Robot palm -->
    <path d="M 30,-22 L 85,-22 Q 95,-22 95,-12 L 95,16 Q 95,26 85,26 L 30,26 Q 20,26 20,16 L 20,-12 Q 20,-22 30,-22 Z" fill="url(#metal)" stroke="#667788" stroke-width="1.2"/>
    <!-- Palm center line -->
    <line x1="25" y1="2" x2="90" y2="2" stroke="#667788" stroke-width="0.6" opacity="0.3"/>
    <!-- Palm LED -->
    <circle cx="58" cy="2" r="4" fill="#4fc3f7" opacity="0.3"/>

    <!-- Robot thumb (wrapping under human palm) -->
    <path d="M 35,26 Q 30,42 15,44 Q 0,44 -8,36" stroke="#8090a0" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="22" cy="35" r="3" fill="#667788" opacity="0.5"/>

    <!-- Robot fingers (wrapping OVER human hand — drawn last so they're on top) -->
    <path d="M 20,-18 Q -5,-20 -18,-10 Q -24,-2 -16,6" stroke="#95a5b5" stroke-width="13" fill="none" stroke-linecap="round"/>
    <circle cx="0" cy="-16" r="2.5" fill="#667788" opacity="0.5"/>
    <path d="M 22,-6 Q -2,-6 -15,4 Q -22,12 -14,18" stroke="#8a9aaa" stroke-width="12" fill="none" stroke-linecap="round"/>
    <circle cx="3" cy="-4" r="2.5" fill="#667788" opacity="0.5"/>
    <path d="M 25,8 Q 2,10 -10,18 Q -16,24 -10,30" stroke="#8090a0" stroke-width="11" fill="none" stroke-linecap="round"/>
    <circle cx="6" cy="10" r="2.5" fill="#667788" opacity="0.5"/>
  </g>

  <!-- ===== TEXT ===== -->
  <text x="400" y="310" text-anchor="middle" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="10">PACT</text>
  <text x="400" y="340" text-anchor="middle" font-size="13" fill="#8899aa" letter-spacing="3">PROGRAMMATIC AGENT CONSTRAINT TOOLKIT</text>
  <text x="400" y="368" text-anchor="middle" font-size="11.5" fill="#667788" font-style="italic">Rules are suggestions. Infrastructure is law.</text>
</svg>
