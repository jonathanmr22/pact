#     MANDATORY FOLLOWUP — vision critique before user review.
#     You just generated an image. Per skills/image_generation_workflow.yaml,
#     run a vision-model critique BEFORE showing the user. The user's eye
#     time is the scarcest resource — model critique is ~$0.001/call vs the
#     attention cost of one bad iteration.
