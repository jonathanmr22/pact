# Cognitive Redirect System — pattern-matched behavior intervention
#
# Real history mined from PACT development sessions (2026-04-29 → 2026-04-30).
# A PostToolUse hook that scans the agent's most recent assistant turn and
# emits Dumbledore-voice SystemReminders on failure-mode language. Designed
# as behavior change, NOT regex enforcement — precision is the existential
# metric (false positives erode trust → agent ignores even true positives).
