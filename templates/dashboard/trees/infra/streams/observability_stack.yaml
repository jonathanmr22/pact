        - { name: "Migrate auth service", status: done }
        - { name: "Migrate user service", status: done }
        - { name: "Migrate billing service", status: done }
        - { name: "Migrate notifications + 4 remaining services", status: done }
        - { name: "Loki ingestion config + retention policy (30 days hot, 90 days cold)", status: done }
        - { name: "Decommission legacy log endpoints", status: done }

    - name: "Distributed tracing"
      status: in_flight
      last_touched: 2026-04-29
      note: "OpenTelemetry SDK across services with auto-instrumentation for HTTP + DB. Tempo for storage, Grafana for visualization."
