# Observability stack v1 — example large initiative
#
# Demonstrates the dashboard's larger box rendering. Many features, many
# tasks. Auto-derived box sizing means this initiative renders bigger
# than smaller ones in the same tree.
node:
  name: "Observability stack v1 (example large)"
  status: in_flight
  last_touched: 2026-04-29
  note: "End-to-end observability rollout: structured logging across all services, distributed tracing for request chains, metrics + dashboards, alert routing, on-call rotations, runbooks. Large initiative — demonstrates that high task counts produce visibly bigger treemap boxes."
  references:
    plans: []

