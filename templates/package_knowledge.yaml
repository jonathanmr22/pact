# =============================================================================
# Package Knowledge — {package_name}
#
# Your verified knowledge about this package. Reading this before writing
# code means every line is correct the first time — no guessing, no
# workarounds, no circular debugging. Research compounds: 10 minutes
# reading docs saves hours of iteration.
#
# Save to: docs/reference/packages/{package_name}.yaml
#
# Check this file BEFORE writing code that uses this package.
# If it doesn't exist yet, research the package first, then create it.
# Every finding you save here extends the next session's capabilities.
# =============================================================================

package: "{package_name}"
version_installed: "{x.y.z}"
version_latest: "{x.y.z}"
last_researched: "YYYY-MM-DD"
source: "{pub.dev / npm / pypi / crates.io URL}"
repository: "{GitHub URL}"

# What this package does and why we use it
purpose: "{One sentence}"

# API surface we actually use (not everything the package offers)
api_used:
  - method: "{ClassName.methodName()}"
    purpose: "{What we use it for}"
    gotchas: "{Any non-obvious behavior}"
  # - method: "..."
  #   purpose: "..."

# Things the agent got wrong or that are non-obvious
known_issues:
  - issue: "{Description}"
    resolution: "{How to handle it}"
    discovered: "YYYY-MM-DD"
  # - issue: "..."

# Breaking changes between versions we care about
migration_notes:
  # - from: "x.y.z"
  #   to: "x.y.z"
  #   changes: "{What changed}"
  #   action: "{What we need to do}"

# Configuration or setup requirements
setup:
  # install: "{command}"
  # config: "{any config file changes needed}"
  # permissions: "{any platform permissions needed}"

# Claude-specific notes (things the agent's training data gets wrong)
agent_mistakes:
  # - mistake: "{What the agent assumed incorrectly}"
  #   reality: "{What actually happens}"
  #   evidence: "{Link to docs/issue that confirms}"
