# Script Catalog — Index of all project scripts
# Last updated: {DATE}
#
# PURPOSE: Help future sessions find and reuse existing scripts
# instead of reinventing solutions. Every script here was written to solve
# a real problem — the lessons are as valuable as the code.
#
# BEFORE WRITING A NEW SCRIPT: Search this catalog by tags. If a script
# already solves a similar problem, adapt it instead of starting from scratch.
#
# STRUCTURE:
#   - category: grouping for browsing
#   - tags: for search (grep this file for a tag)
#   - deps: what must be installed/configured
#   - env_vars: required environment variables
#   - patterns: reusable patterns worth knowing (the gold)
#   - lessons: hard-won knowledge from failures (the platinum)
#
# MAINTENANCE: When you create or significantly modify a script, add/update
# its entry here. The pre-edit-rules hook blocks editing scripts/ without
# reading this catalog first.

