# ═══════════════════════════════════════════════════════════════════
# REUSABLE PATTERNS (cross-cutting lessons)
# ═══════════════════════════════════════════════════════════════════
#
# These patterns appear in multiple scripts. Check here before solving
# a problem from scratch.

reusable_patterns:

  windows_encoding_fix:
    description: "Fix Windows cp1252 crash on non-ASCII text"
    pattern: |
      # Add at TOP of script, before any imports that print
      import sys, io
      sys.stdout = io.TextIOWrapper(sys.stdout.buffer, encoding='utf-8', errors='replace')
      sys.stderr = io.TextIOWrapper(sys.stderr.buffer, encoding='utf-8', errors='replace')

  idempotent_batch_processing:
    description: "Process large datasets idempotently (skip already-done items)"
    pattern: |
      # Query for items that still need processing
      url = f'{API_URL}/table?target_column=is.null&order=priority.desc'
      # Process each — if script crashes, re-run picks up where it left off

  pact_delegate_subprocess:
    description: "Call pact-delegate from Python and parse output"
    pattern: |
      result = subprocess.run(
          ['bash', PACT_DELEGATE, task_type, prompt, '--max-tokens', str(n)],
          capture_output=True, text=False, timeout=120,  # text=False for Windows
      )
      output = (result.stdout or b'').decode('utf-8', errors='replace')
      # Strip ANSI codes before JSON parsing
      output = re.sub(r'\x1b\[[0-9;]*m', '', output)
