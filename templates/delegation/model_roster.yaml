      Deep research specialist. Reads documentation, summarizes changelogs,
      drafts plans and feature flows, classifies content. 96% cheaper than Claude.
    color: "#6C63FF"
    accent: "#1B1B3A"
    cost_per_million_output: 0.90
    context_window_tokens: 262000
    stats:
      reasoning: 78
      speed: 85
      cost_efficiency: 96
      context_window: 75
