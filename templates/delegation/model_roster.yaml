# PACT Multi-Model Delegation — Model Roster Template
#
# Customize this file for your project. Models can be swapped by editing
# a single model_id line. The pact-delegate CLI reads this config at runtime.
#
# API keys are NEVER stored here. They come from environment variables.
# Required env vars:
#   OPENROUTER_API_KEY — for worker models (get from openrouter.ai/keys)
#   GEMINI_API_KEY     — for Gemini orchestrator fallback (optional, free tier available)

# --------------------------------------------------------------------------
# ORCHESTRATORS — Claude is primary, Gemini is fallback
# --------------------------------------------------------------------------
orchestrators:

  primary:
    name: Claude
    full_name: "Claude Opus 4.6"
    provider: Anthropic
    model_id: "claude-opus-4-6"
    role: orchestrator
    tagline: "The Architect"
    description: >
      Primary session commander. Makes architecture decisions, reviews all code,
      commits every change. The only model trusted with security, encryption,
      schema changes, and governance files.
    color: "#D4A843"
    accent: "#1A1A2E"
    stats:
      reasoning: 99
      speed: 60
      cost_efficiency: 30
      context_window: 95
      code_quality: 98
    strengths:
      - "Architecture & system design"
      - "Complex debugging & causal tracing"
      - "Security & encryption"
      - "Code review & final authority"
      - "Multi-hop dependency analysis"
    never_delegates:
      - "Security, encryption, or auth code"
      - "Architecture decisions or schema changes"
      - "PACT governance (CLAUDE.md, feature flows, hooks)"
      - "Bug fixes (causal chain tracing)"
      - "Final code review before commit"
    card_image: "delegation/roster/claude.png"

  fallback:
    name: Gemini
    full_name: "Gemini 2.5 Pro"
    provider: Google
    model_id: "gemini-2.5-pro"
    role: orchestrator
    tagline: "The Commander"
    description: >
      Fallback orchestrator. When Claude is unavailable (outage, quota, degraded),
      Gemini takes over as session commander — inheriting the same rules, the same
      hooks, and the same task tracker. Also manages worker model delegation
      when acting as orchestrator. Free tier: 1,000 req/day.
    color: "#4285F4"
    accent: "#1A1A2E"
    stats:
      reasoning: 90
      speed: 80
      cost_efficiency: 85
      context_window: 95
      code_quality: 85
    strengths:
      - "Built-in Google Search (no WebSearch tool needed)"
      - "Free tier — zero cost for full sessions"
      - "Strong code generation"
      - "Shares all PACT governance with Claude"
      - "Can orchestrate worker models via pact-delegate"
    when_active: >
      Gemini becomes orchestrator when: (1) Claude is down/degraded,
      (2) session-status-check.sh reports Claude incident, (3) user
      explicitly starts a Gemini session. When orchestrating, Gemini
      follows the same delegation decision tree as Claude and can invoke
      pact-delegate to route tasks to Trinity/M2.5.
    card_image: "delegation/roster/gemini.png"

# --------------------------------------------------------------------------
# WORKER MODELS — routable via pact-delegate
# --------------------------------------------------------------------------
workers:

  research:
